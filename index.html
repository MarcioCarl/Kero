    function mostrarNotificacao(msg, tipo) {
        const tipos = { 'success': { classe: 'notificacao-success', icon: 'fa-check-circle' }, 'error': { classe: 'notificacao-error', icon: 'fa-exclamation-circle' }, 'info': { classe: 'notificacao-info', icon: 'fa-info-circle' }, 'warning': { classe: 'notificacao-warning', icon: 'fa-exclamation-triangle' } };

        document.querySelectorAll('.notificacao').forEach(n => n.remove());
        const notificacao = document.createElement('div');
        notificacao.className = `notificacao ${config.classe}`;
        notificacao.innerHTML = `<i class="fas ${config.icon}"></i><span>${msg}</span><button onclick="this.parentElement.remove()">&times;</button>`;
        document.body.appendChild(notificacao);
        setTimeout(() => notificacao.remove(), 5000);
    }

    async function initializeMicrosoft() {
        try {
            console.log("Inicializando MSAL...");
            msalInstance = new msal.PublicClientApplication(msalConfig);
            await msalInstance.initialize();
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length > 0) { 
                account = accounts[0]; 
                console.log("Conta encontrada:", account.username);
                return true; 
            }
            console.log("Nenhuma conta encontrada");
            return false;
        } catch (error) { 
            console.error('MSAL init error:', error); 
            return false;
        }
    }

    async function getAccessToken(scopes) {
        const request = { account, scopes };
        try { 
            return (await msalInstance.acquireTokenSilent(request)).accessToken; 
        } catch (e) { 
            console.log("Erro ao obter token silencioso, tentando popup:", e);
            return (await msalInstance.acquireTokenPopup(request)).accessToken; 
        }
    }

    async function getUserInfo() {
        const token = await getAccessToken(['User.Read']);
        const resp = await fetch('https://graph.microsoft.com/v1.0/me', { headers: { 'Authorization': `Bearer ${token}` } });
        return await resp.json();
    }

    async function fazerLoginMicrosoft() {
        showLoading();
        try {
            console.log("Iniciando login...");
            
            // Verificar se já tem clientId
            const clientId = localStorage.getItem('microsoft_client_id');
            if (!clientId) {
                console.log("Client ID não encontrado");
                hideLoading();
                abrirModal('modalConfiguracaoInicial');
                return;
            }
            
            // Inicializar MSAL se necessário
            if (!msalInstance) {
                await initializeMicrosoft();
            }
            
            // Tentar login popup
            console.log("Abrindo popup de login...");
            const response = await msalInstance.loginPopup(loginRequest);
            console.log("Login bem sucedido:", response);
            account = response.account;
            
            // Obter informações do usuário
            const userInfo = await getUserInfo();
            console.log("User info:", userInfo);
            const email = userInfo.mail || userInfo.userPrincipalName;
            let perfil = perfisManuais[email] || 'Colaborador';
            
            usuarioAtual = {
                id: userInfo.id,
                nome: userInfo.displayName,
                email: email,
                perfil: perfil,
                departamento: userInfo.department || 'Não definido',
                ultimoAcesso: new Date().toISOString()
            };
            
            emailService = new EmailService({ getAccessToken });
            
            document.getElementById('currentUserName').textContent = usuarioAtual.nome;
            document.getElementById('currentUserRole').textContent = usuarioAtual.perfil;
            
            localStorage.setItem('keroSessao', JSON.stringify({
                usuarioId: usuarioAtual.id,
                perfil: usuarioAtual.perfil,
                email: usuarioAtual.email,
                expira: new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString()
            }));
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainSystem').style.display = 'block';
            controlarMenusPorPerfil();
            mostrarSelecaoModulos();
            mostrarNotificacao(`Bem-vindo(a), ${usuarioAtual.nome}!`, 'success');
            
        } catch (error) {
            console.error('Erro no login:', error);
            document.getElementById('loginErrorMessage').textContent = error.message;
            document.getElementById('loginError').style.display = 'block';
        } finally { 
            hideLoading(); 
        }
    }

    async function verificarSessao() {
        const sessao = localStorage.getItem('keroSessao');
        if (sessao) {
            try {
                const dados = JSON.parse(sessao);
                if (new Date(dados.expira) > new Date()) {
                    await initializeMicrosoft();
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length > 0) {
                        account = accounts[0];
                        const userInfo = await getUserInfo();
                        const email = userInfo.mail || userInfo.userPrincipalName;
                        let perfil = perfisManuais[email] || dados.perfil;
                        
                        usuarioAtual = {
                            id: userInfo.id,
                            nome: userInfo.displayName,
                            email: email,
                            perfil: perfil,
                            departamento: userInfo.department || 'Não definido',
                            ultimoAcesso: new Date().toISOString()
                        };
                        
                        emailService = new EmailService({ getAccessToken });
                        
                        document.getElementById('currentUserName').textContent = usuarioAtual.nome;
                        document.getElementById('currentUserRole').textContent = usuarioAtual.perfil;
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('mainSystem').style.display = 'block';
                        controlarMenusPorPerfil();
                        mostrarSelecaoModulos();
                        mostrarNotificacao(`Bem-vindo(a) de volta, ${usuarioAtual.nome}!`, 'success');
                        return;
                    }
                }
                localStorage.removeItem('keroSessao');
            } catch (e) { 
                console.error("Erro ao verificar sessão:", e);
                localStorage.removeItem('keroSessao'); 
            }
        }
    }

    async function enviarEmailNotificacao(tipo, dados) {
        if (!configuracoes.emailNotif || !emailService) return;
        
        const emailsTodos = ['marcio.carlos@accordgrouplda.com', 'paulo.silva@accordgrouplda.com'];
        let assunto = '', conteudo = '', destinatarios = [];

        switch (tipo) {
            case 'nova_requisicao':
                assunto = `🔔 Nova Requisição: ${dados.codigo}`;
                conteudo = emailService.templateNovaRequisicao(dados);
                destinatarios = emailsTodos;
                break;
            case 'andamento':
                assunto = `📋 Atualização: ${dados.codigo}`;
                conteudo = emailService.templateNotificacaoAndamento(dados.req, dados.fase, dados.responsavel, dados.comentario);
                destinatarios = emailsTodos;
                break;
            case 'aprovacao_final':
                assunto = `✅ REQUISIÇÃO APROVADA: ${dados.codigo}`;
                conteudo = emailService.templateAprovacaoFinal(dados.req, dados.aprovador, dados.comentario);
                destinatarios = [...new Set([...emailsTodos, 'mario.arao@accordgrouplda.com', dados.req.criadoPorEmail])];
                break;
            case 'rejeicao':
                assunto = `❌ Requisição Rejeitada: ${dados.codigo}`;
                conteudo = emailService.templateRejeicao(dados.req, dados.rejeitadoPor, dados.fase, dados.comentario);
                destinatarios = [...new Set([...emailsTodos, 'mario.arao@accordgrouplda.com', dados.req.criadoPorEmail])];
                break;
            default: return;
        }

        for (const email of destinatarios) {
            if (email) await emailService.sendEmail(email, assunto, conteudo);
        }
    }

        const secs = ['dashboard', 'requisicoes', 'aprovacoes', 'relatorios', 'utilizadores', 'direcoes', 'configuracoes', 'analytics', 'calendario', 'mensagens'];
        secs.forEach(s => { const el = document.getElementById(s + 'Section'); if (el) el.style.display = s === aba ? 'block' : 'none'; });
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (elem) elem.classList.add('active');
        if (aba === 'dashboard') { carregarDashboard(); atualizarKPIs(); verificarAprovacoesPendentes(); atualizarGraficos(); }
        if (aba === 'aprovacoes') carregarAprovacoes();
        if (aba === 'utilizadores') carregarUtilizadores();
        if (aba === 'direcoes') carregarDirecoes();
        if (aba === 'analytics') carregarAnalytics();
        if (aba === 'calendario') carregarCalendario();
        if (aba === 'mensagens') carregarMensagens();
        if (window.innerWidth <= 768) document.getElementById('navMenu').classList.remove('mobile-open');
    }

    function inicializarDirecoes() {
        const sel = document.getElementById('direcao');
        const filtro = document.getElementById('filterDirecao');
        const areaManut = document.getElementById('areaManutencao');
        const depto = document.getElementById('userDepartamento');
        const gestor = document.getElementById('direcaoGestor');
        const dirs = Object.keys(areasPorDirecao).sort();
        if (sel) { sel.innerHTML = '<option value="">Selecione</option>'; dirs.forEach(d => sel.appendChild(new Option(d, d))); }
        if (filtro) { filtro.innerHTML = '<option value="all">Todas</option>'; dirs.forEach(d => filtro.appendChild(new Option(d, d))); }
        if (areaManut) { areaManut.innerHTML = '<option value="">Selecione</option>'; dirs.forEach(d => areaManut.appendChild(new Option(d, d))); }
        if (depto) { depto.innerHTML = '<option value="">Selecione</option>'; dirs.forEach(d => depto.appendChild(new Option(d, d))); }
        if (gestor) { gestor.innerHTML = '<option value="">Selecione</option>'; }
        document.getElementById('area').innerHTML = '<option value="">Selecione</option>';
        document.getElementById('direcao').addEventListener('change', function() { const dir = this.value; const selArea = document.getElementById('area'); selArea.innerHTML = '<option value="">Selecione</option>'; if (dir && areasPorDirecao[dir]) areasPorDirecao[dir].sort().forEach(a => selArea.appendChild(new Option(a, a))); });
    }

    function atualizarAreas() { 
        const dir = document.getElementById('direcao').value; 
        const sel = document.getElementById('area'); 
        if (!sel) return; 
        sel.innerHTML = '<option value="">Selecione</option>'; 
        if (dir && areasPorDirecao[dir]) areasPorDirecao[dir].sort().forEach(a => sel.appendChild(new Option(a, a))); 
    }

    function filtrarRequisicoes() {
        let lista = requisicoes;
        if (estado.filtrosAtivos.pesquisa) { 
            const p = estado.filtrosAtivos.pesquisa.toLowerCase(); 
            lista = lista.filter(r => r.codigo.toLowerCase().includes(p) || r.funcao.toLowerCase().includes(p)); 
        }
        if (estado.filtrosAtivos.status) lista = lista.filter(r => r.status === estado.filtrosAtivos.status);
        if (estado.filtrosAtivos.direcao) lista = lista.filter(r => r.direcao === estado.filtrosAtivos.direcao);
        requisicoesFiltradas = lista.sort((a, b) => estado.ordenacao === 'newest' ? new Date(b.dataCriacao) - new Date(a.dataCriacao) : new Date(a.dataCriacao) - new Date(b.dataCriacao));
        estado.paginaAtual = 1;
        carregarRequisicoes();
        atualizarGraficos();
        document.getElementById('resultCount').textContent = `(${requisicoesFiltradas.length})`;
    }

    function carregarRequisicoes() {
        const tbody = document.getElementById('corpoTabela');
        const empty = document.getElementById('emptyState');
        if (!tbody) return;
        if (requisicoesFiltradas.length === 0) { tbody.innerHTML = ''; if (empty) empty.style.display = 'block'; return; }
        if (empty) empty.style.display = 'none';
        const inicio = (estado.paginaAtual - 1) * estado.itensPorPagina;
        const itens = requisicoesFiltradas.slice(inicio, inicio + estado.itensPorPagina);
        let html = '';
        itens.forEach(r => {
            html += `<tr onclick="visualizarRequisicao(${r.id})">}<td>${r.codigo}</td><td>${r.funcao}</td><td>${r.direcao}</td><td><span class="status-badge status-${r.status}">${getStatusText(r.status)}</span></td><td>${getTipoBadge(r.tipo)}</td><td>${formatarData(r.dataInicio)}</td><td><div class="action-buttons"><button class="btn-small btn-view" onclick="visualizarRequisicao(${r.id})"><i class="fas fa-eye"></i></button>${getBotoesAcao(r)}<button class="btn-small btn-message" onclick="abrirModalEnviarMensagem(${r.criadoPorId}, '${r.criadoPor}', ${r.id}, '${r.codigo}')"><i class="fas fa-comment"></i></button></div></td></tr>`;
        });
        tbody.innerHTML = html;
        const total = Math.ceil(requisicoesFiltradas.length / estado.itensPorPagina);
        document.getElementById('paginaAnterior').disabled = estado.paginaAtual === 1;
        document.getElementById('paginaProxima').disabled = estado.paginaAtual === total;
        document.getElementById('infoPagina').textContent = `Página ${estado.paginaAtual} de ${total || 1}`;
    }

    function getBotoesAcao(req) {
        if (!usuarioAtual) return '';
        const podeAprovar = (req.status === 'em_validacao_rh' && (usuarioAtual.perfil === 'RH' || usuarioAtual.perfil === 'Administrador')) ||
            (req.status === 'em_validacao_financas' && (usuarioAtual.perfil === 'Controlo de Gestão' || usuarioAtual.perfil === 'Administrador')) ||
            (req.status === 'em_validacao_director' && (usuarioAtual.perfil === 'Director Geral' || usuarioAtual.perfil === 'Administrador'));
        if (podeAprovar) return `<button class="btn-small btn-approve" onclick="abrirModalComentario(${req.id}, 'aprovar')"><i class="fas fa-check"></i></button><button class="btn-small btn-reject" onclick="abrirModalComentario(${req.id}, 'rejeitar')"><i class="fas fa-times"></i></button>`;
        return '';
    }

    function abrirModalComentario(id, acao) { 
        document.getElementById('comentarioRequisicaoId').value = id; 
        document.getElementById('comentarioAcao').value = acao; 
        document.getElementById('comentario').value = ''; 
        abrirModal('modalComentario'); 
    }

    async function processarComentario() {
        const id = parseInt(document.getElementById('comentarioRequisicaoId').value);
        const acao = document.getElementById('comentarioAcao').value;
        const coment = document.getElementById('comentario').value;
        const req = requisicoes.find(r => r.id === id);
        if (!req || !coment) { mostrarNotificacao('Comentário obrigatório', 'error'); return; }
        if (acao === 'aprovar') {
            if (req.status === 'em_validacao_rh') {
                req.status = 'em_validacao_financas';
                await enviarEmailNotificacao('andamento', { req: req, fase: 'em_validacao_financas', responsavel: usuarioAtual.nome, comentario: coment });
                mostrarNotificacao(`Requisição ${req.codigo} aprovada pelo RH! Segue para Controlo de Gestão.`, 'success');
            } else if (req.status === 'em_validacao_financas') {
                req.status = 'em_validacao_director';
                await enviarEmailNotificacao('andamento', { req: req, fase: 'em_validacao_director', responsavel: usuarioAtual.nome, comentario: coment });
                mostrarNotificacao(`Requisição ${req.codigo} aprovada pelo CG! Segue para Direção Geral.`, 'success');
            } else if (req.status === 'em_validacao_director') {
                req.status = 'aprovada';
                await enviarEmailNotificacao('aprovacao_final', { req: req, aprovador: usuarioAtual.nome, comentario: coment });
                mostrarNotificacao(`Requisição ${req.codigo} APROVADA! Email enviado para o solicitante.`, 'success');
            }
        } else if (acao === 'rejeitar') {
            req.status = 'rejeitada';
            await enviarEmailNotificacao('rejeicao', { req: req, rejeitadoPor: usuarioAtual.nome, fase: usuarioAtual.perfil, comentario: coment });
            mostrarNotificacao(`Requisição ${req.codigo} rejeitada!`, 'warning');
        }
        req.historico.push({ fase: acao, data: new Date().toISOString(), responsavel: usuarioAtual.nome, comentario: coment });
        fecharModal('modalComentario');
        filtrarRequisicoes();
        carregarAprovacoes();
        atualizarKPIs();
    }

    function visualizarRequisicao(id) {
        const req = requisicoes.find(r => r.id === id);
        if (!req) return;
        document.getElementById('codigoModal').textContent = req.codigo;
        let html = `<div><strong>Função:</strong> ${req.funcao}</div><div><strong>Direção:</strong> ${req.direcao}</div><div><strong>Status:</strong> ${getStatusText(req.status)}</div><div><strong>Observações:</strong> ${req.observacoes || 'N/A'}</div>`;
        document.getElementById('conteudoModal').innerHTML = html;
        abrirModal('modalVisualizar');
    }

    function carregarAprovacoes() {
        const tbody = document.getElementById('corpoAprovacoes');
        if (!tbody) return;
        let pendentes = [];
        if (usuarioAtual?.perfil === 'RH') pendentes = requisicoes.filter(r => r.status === 'em_validacao_rh');
        else if (usuarioAtual?.perfil === 'Controlo de Gestão') pendentes = requisicoes.filter(r => r.status === 'em_validacao_financas');
        else if (usuarioAtual?.perfil === 'Director Geral') pendentes = requisicoes.filter(r => r.status === 'em_validacao_director');
        else if (usuarioAtual?.perfil === 'Administrador') pendentes = requisicoes.filter(r => ['em_validacao_rh', 'em_validacao_financas', 'em_validacao_director'].includes(r.status));
        tbody.innerHTML = pendentes.map(r => `<tr onclick="visualizarRequisicao(${r.id})">}<td>${r.codigo}</td><td>${r.funcao}</td><td>${r.direcao}</td><td><span class="status-badge status-${r.status}">${getStatusText(r.status)}</span></td><td>${formatarData(r.dataCriacao)}</td><td><div class="action-buttons"><button class="btn-small btn-view" onclick="visualizarRequisicao(${r.id})"><i class="fas fa-eye"></i></button>${getBotoesAcao(r)}<button class="btn-small btn-message" onclick="abrirModalEnviarMensagem(${r.criadoPorId}, '${r.criadoPor}', ${r.id}, '${r.codigo}')"><i class="fas fa-comment"></i></button></div></td></tr>`).join('');
    }

    function carregarDashboard() {
        const cont = document.getElementById('atividadesRecentes');
        if (!cont) return;
        const atv = [];
        requisicoes.forEach(r => { if (r.historico && r.historico.length) atv.push({ data: r.historico[0].data, texto: `${r.codigo} - ${r.funcao} criada por ${r.criadoPor}` }); });
        atv.sort((a, b) => new Date(b.data) - new Date(a.data));
        cont.innerHTML = atv.slice(0, 5).map(a => `<div class="activity-item"><div class="activity-icon"><i class="fas fa-plus-circle"></i></div><div class="activity-details"><div class="activity-title">${a.texto}</div><div class="activity-time">${formatarData(a.data.split('T')[0])}</div></div></div>`).join('');
    }

    function atualizarKPIs() {
        document.getElementById('kpiRequisicoesAtivas').textContent = requisicoes.length;
        document.getElementById('kpiEmAprovacao').textContent = requisicoes.filter(r => ['em_validacao_rh', 'em_validacao_financas', 'em_validacao_director'].includes(r.status)).length;
        document.getElementById('kpiAprovadasMes').textContent = requisicoes.filter(r => r.status === 'aprovada').length;
        document.getElementById('kpiVagasAbertas').textContent = requisicoes.filter(r => r.status === 'aprovada').reduce((s, r) => s + r.quantidade, 0);
        document.getElementById('kpiTaxaAprovacao').textContent = requisicoes.length ? Math.round(requisicoes.filter(r => r.status === 'aprovada').length / requisicoes.length * 100) + '%' : '0%';
        document.getElementById('filterStats').textContent = `(${requisicoes.length} total)`;
    }

    function verificarAprovacoesPendentes() {
        const card = document.getElementById('aprovacoesPendentesCard');
        const cont = document.getElementById('contadorAprovacoesPendentes');
        if (!usuarioAtual || ['RH', 'Controlo de Gestão', 'Director Geral', 'Administrador'].includes(usuarioAtual.perfil)) { if (card) card.style.display = 'none'; return; }
        const pend = requisicoes.filter(r => ['em_validacao_rh', 'em_validacao_financas', 'em_validacao_director'].includes(r.status));
        if (pend.length) { card.style.display = 'block'; cont.textContent = pend.length; }
        else card.style.display = 'none';
    }

    function inicializarGraficos() {
        const ctx = document.getElementById('statusChart')?.getContext('2d');
        if (ctx) graficos.status = new Chart(ctx, { type: 'doughnut', data: { labels: ['Aprovadas', 'Pendentes RH', 'Pendentes CG', 'Pendentes Director'], datasets: [{ data: [0, 0, 0, 0], backgroundColor: ['#4CAF50', '#FF9800', '#FFC107', '#FF5722'] }] } });
    }

    function atualizarGraficos() {
        if (!graficos.status) return;
        const aprov = requisicoes.filter(r => r.status === 'aprovada').length;
        const pendRH = requisicoes.filter(r => r.status === 'em_validacao_rh').length;
        const pendCG = requisicoes.filter(r => r.status === 'em_validacao_financas').length;
        const pendDir = requisicoes.filter(r => r.status === 'em_validacao_director').length;
        graficos.status.data.datasets[0].data = [aprov, pendRH, pendCG, pendDir];
        graficos.status.update();
    }

    function carregarUtilizadores() { const tbody = document.getElementById('tabelaUtilizadores'); if (tbody) tbody.innerHTML = ''; }
    function carregarDirecoes() { const cont = document.getElementById('direcoesList'); if (cont) cont.innerHTML = Object.keys(areasPorDirecao).sort().map(d => `<div class="direcao-item"><div class="direcao-header"><span class="direcao-nome"><i class="fas fa-building"></i> ${d}</span></div><div class="direcao-categorias">${areasPorDirecao[d].map(c => `<span class="categoria-tag">${c}</span>`).join('')}</div></div>`).join(''); }
    function carregarConfiguracoes() { document.getElementById('configEmailAdmin').value = configuracoes.emailAdmin; document.getElementById('configEmailNotif').checked = configuracoes.emailNotif; }
    function salvarConfiguracoes() { configuracoes.emailAdmin = document.getElementById('configEmailAdmin').value; configuracoes.emailNotif = document.getElementById('configEmailNotif').checked; mostrarNotificacao('Configurações salvas', 'success'); }
    function carregarNotificacoes() { document.getElementById('notificationBadge').setAttribute('data-count', '0'); document.getElementById('notificationList').innerHTML = '<div class="notification-empty">Sem notificações</div>'; }
    function toggleNotifications() { document.getElementById('notificationPanel').classList.toggle('show'); }
    function markAllAsRead() { mostrarNotificacao('Todas marcadas', 'success'); }
    function carregarAnalytics() { document.getElementById('analyticsInsights').innerHTML = `<div class="dashboard-grid"><div class="dashboard-card"><h3>Total Requisições</h3><p>${requisicoes.length}</p></div><div class="dashboard-card"><h3>Aprovadas</h3><p>${requisicoes.filter(r => r.status === 'aprovada').length}</p></div></div>`; }
    function carregarCalendario() { const container = document.getElementById('calendarContainer'); if (container) container.innerHTML = '<div class="calendar-grid">Carregando...</div>'; }
    function calendarPrevMonth() { }
    function calendarNextMonth() { }
    function limparFiltros() { estado.filtrosAtivos = { pesquisa: null, status: null, direcao: null }; document.getElementById('filterPesquisa').value = ''; document.getElementById('filterStatus').value = 'all'; document.getElementById('filterDirecao').value = 'all'; filtrarRequisicoes(); mostrarNotificacao('Filtros limpos', 'info'); }
    function filtrarPorStatus(s) { document.getElementById('filterStatus').value = s === 'ativas' ? 'all' : s; filtrarRequisicoes(); mudarAba('requisicoes', document.querySelector('.nav-item[onclick*="requisicoes"]')); }
    function exportarParaCSV() { mostrarNotificacao('Exportado para CSV', 'success'); }
    function exportarParaExcel() { mostrarNotificacao('Exportado para Excel', 'success'); }
    function exportarParaPDF() { mostrarNotificacao('Exportado para PDF', 'success'); }
    function gerarRelatorioMensal() { mostrarNotificacao('Relatório mensal gerado', 'success'); }
    function gerarRelatorioAnual() { mostrarNotificacao('Relatório anual gerado', 'success'); }
    function gerarRelatorioDepartamentos() { mostrarNotificacao('Relatório por departamento gerado', 'success'); }
    function carregarMensagens() { const container = document.getElementById('mensagensList'); if (container) container.innerHTML = '<div class="mensagem-item" style="text-align:center;">Nenhuma mensagem</div>'; }
    function abrirModalNovaMensagem() { mostrarNotificacao('Funcionalidade em desenvolvimento', 'info'); }
    function abrirModalEnviarMensagem(destinatarioId, destinatarioNome, requisicaoId, requisicaoCodigo) { mostrarNotificacao('Funcionalidade em desenvolvimento', 'info'); }
    function selecionarTipo(tipo) { document.getElementById('tipoRequisicao').value = tipo; fecharModal('modalTipo'); abrirModal('modalNovaRequisicao'); document.getElementById('campoSubstituicao').style.display = tipo === 'substituicao' ? 'block' : 'none'; document.getElementById('campoReforco').style.display = tipo === 'reforco_quadro' ? 'block' : 'none'; }
    async function salvarRequisicao(e) {
        e.preventDefault();
        const tipo = document.getElementById('tipoRequisicao').value;
        const dir = document.getElementById('direcao').value;
        const area = document.getElementById('area').value;
        const funcao = document.getElementById('funcao').value;
        const qtd = parseInt(document.getElementById('quantidade').value);
        const dataInicio = document.getElementById('dataInicio').value;
        const obs = document.getElementById('observacoes').value;
        if (!tipo || !dir || !area || !funcao || !qtd || !dataInicio) { mostrarNotificacao('Preencha todos os campos', 'error'); return; }
        const novoId = Date.now();
        const novoCodigo = `REQ-${new Date().getFullYear()}-${String(requisicoes.length + 1).padStart(3, '0')}`;
        const dados = { id: novoId, codigo: novoCodigo, funcao: funcao, direcao: dir, area: area, quantidade: qtd, status: 'em_validacao_rh', tipo: tipo, dataCriacao: new Date().toISOString(), dataInicio: dataInicio, criadoPor: usuarioAtual.nome, criadoPorId: usuarioAtual.id, criadoPorEmail: usuarioAtual.email, observacoes: obs || '', historico: [{ fase: 'criacao', data: new Date().toISOString(), responsavel: usuarioAtual.nome, comentario: 'Requisição criada' }] };
        requisicoes.unshift(dados);
        enviarEmailNotificacao('nova_requisicao', dados);
        fecharModal('modalNovaRequisicao');
        document.getElementById('formNovaRequisicao').reset();
        filtrarRequisicoes();
        carregarAprovacoes();
        atualizarKPIs();
        mostrarNotificacao(`Requisição ${novoCodigo} criada!`, 'success');
    }
    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; }

    function abrirModalNovaDirecao() { mostrarNotificacao('Funcionalidade em desenvolvimento', 'info'); }

    function carregarPlafondUsuario() { }

    // INICIALIZAÇÃO
    document.addEventListener('DOMContentLoaded', async function () {
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        const clientId = localStorage.getItem('microsoft_client_id');
        if (!clientId) setTimeout(() => abrirModal('modalConfiguracaoInicial'), 500);
        await initializeMicrosoft();
        await verificarSessao();
        inicializarDirecoes();
        carregarUtilizadores();
        carregarDirecoes();
        carregarNotificacoes();
        carregarConfiguracoes();

        document.getElementById('formNovaRequisicao')?.addEventListener('submit', salvarRequisicao);
        document.getElementById('formComentario')?.addEventListener('submit', processarComentario);
        document.getElementById('btnNovaRequisicao')?.addEventListener('click', () => abrirModal('modalTipo'));
        document.getElementById('filterPesquisa')?.addEventListener('input', function (e) { estado.filtrosAtivos.pesquisa = e.target.value || null; filtrarRequisicoes(); });
        document.getElementById('filterStatus')?.addEventListener('change', function (e) { estado.filtrosAtivos.status = e.target.value === 'all' ? null : e.target.value; filtrarRequisicoes(); });
        document.getElementById('filterDirecao')?.addEventListener('change', function (e) { estado.filtrosAtivos.direcao = e.target.value === 'all' ? null : e.target.value; filtrarRequisicoes(); });
        document.getElementById('sortRequisicoes')?.addEventListener('change', function (e) { estado.ordenacao = e.target.value; filtrarRequisicoes(); });
        document.getElementById('itemsPerPage')?.addEventListener('change', function (e) { estado.itensPorPagina = parseInt(e.target.value); estado.paginaAtual = 1; carregarRequisicoes(); });
        document.getElementById('paginaAnterior')?.addEventListener('click', () => { if (estado.paginaAtual > 1) { estado.paginaAtual--; carregarRequisicoes(); } });
        document.getElementById('paginaProxima')?.addEventListener('click', () => { const total = Math.ceil(requisicoesFiltradas.length / estado.itensPorPagina); if (estado.paginaAtual < total) { estado.paginaAtual++; carregarRequisicoes(); } });
        document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', function (e) { if (e.target === this) fecharModal(this.id); }));
    });
</script>
